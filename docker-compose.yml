# InduVista — Phase 0–2 Compose stack.
#
# Default `docker compose up` brings up the rigid foundation only:
#   - postgres (TimescaleDB)
#   - migrate (runs `alembic upgrade head`, then exits)
#   - backend (FastAPI)
#
# Optional profiles:
#   --profile workers  → modbus_worker + replay_worker
#   --profile sim      → modbus_simulator (Phase 1 dev only)
#
# Example:
#   docker compose --profile sim --profile workers up

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: svj_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Bind to localhost only — never expose Postgres on the LAN by default.
      - "127.0.0.1:5432:5432"
    volumes:
      - svj_postgres_data:/var/lib/postgresql/data
      # Init scripts run only on first boot (empty data dir). Use Alembic for
      # schema changes after that.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # -h localhost forces a TCP check. Without it, pg_isready uses the Unix
      # socket, which is up during Postgres's internal init phase before TCP
      # is actually listening — causing dependents to start too early.
      test: ["CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  migrate:
    build: ./backend
    container_name: svj_migrate
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    working_dir: /app
    command: ["alembic", "upgrade", "head"]
    # Run-once: not a long-lived service.
    restart: "no"

  backend:
    build: ./backend
    container_name: svj_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/app:/app/app
      # Mounted read-only so `docker compose run backend python -m app.seed`
      # can read the canonical tag config. The seeder NEVER writes here.
      - ./backend/alembic:/app/alembic
      - ./config:/app/config:ro
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--timeout-graceful-shutdown", "5"]

  modbus_simulator:
    build: ./simulators
    container_name: svj_modbus_simulator
    restart: unless-stopped
    profiles: ["sim"]
    ports:
      - "127.0.0.1:5020:5020"
    volumes:
      # The simulator reads tag definitions from this JSON. Mounted read-only
      # so the container can never mutate the canonical config.
      - ./config:/app/config:ro
    environment:
      CONFIG_ROOT: /app/config
      SIM_DEVICE: FLOWCOMP_001

  modbus_worker:
    build: ./backend
    container_name: svj_modbus_worker
    restart: unless-stopped
    profiles: ["workers"]
    env_file:
      - .env
    environment:
      SF_BUFFER_PATH: /data/sf_buffer.db
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # Workers need a moment to drain in-flight Modbus reads and flush the
    # store-and-forward SQLite buffer. 15s is comfortable headroom.
    stop_grace_period: 15s
    volumes:
      - ./backend/app:/app/app
      # Durable local buffer for store-and-forward. Survives container
      # restart so a Postgres outage that outlasts the worker doesn't
      # cost samples.
      - ./storage:/data
    command: ["python", "-m", "app.workers.modbus_supervisor"]

  opc_worker:
      build: ./backend
      container_name: svj_opc_worker
      restart: unless-stopped
      profiles: ["workers"]
      env_file:
        - .env
      environment:
        # Store-and-forward buffer for OPC samples. Sits next to the
        # modbus worker's sf_buffer.db in the same ./storage host path
        # — different filename so the two workers don't contend.
        SF_OPC_BUFFER_PATH: /data/sf_opc.db
        LOG_LEVEL: INFO
        # NEW — silence asyncua's verbose per-message logs.
        # Our own __main__ logger stays at INFO; asyncua at WARNING.
        ASYNCUA_LOG_LEVEL: WARNING
      depends_on:
        postgres:
          condition: service_healthy
        migrate:
          condition: service_completed_successfully
      # Worker needs a moment to drain in-flight OPC samples through the
      # flusher and gracefully delete subscriptions before exiting.
      stop_grace_period: 15s
      volumes:
        - ./backend/app:/app/app
        # Shared with modbus_worker — host-path mount means the SF buffer
        # survives container rebuilds. The two workers write different
        # filenames so no contention on SQLite.
        - ./storage:/data
      command: ["python", "-m", "app.workers.opc_supervisor"]

  # NOTE: A separate replay_worker service was originally planned. Phase 2
  # folded the replay loop into modbus_supervisor so we have one process,
  # one SQLite writer, and no multi-writer dance on the local buffer. If
  # polling and replay ever need independent scaling, split them back out
  # by reading from ./storage:/data in a dedicated container.
  alarm_evaluator:
      build: ./backend
      container_name: svj_alarm_evaluator
      restart: unless-stopped
      env_file:
        - .env
      depends_on:
        postgres:
          condition: service_healthy
        migrate:
          condition: service_completed_successfully
      # Same rationale as calc_evaluator — drain current tick before exit.
      stop_grace_period: 15s
      volumes:
        - ./backend/app:/app/app
      command: ["python", "-m", "app.workers.alarm_evaluator"]

  calc_evaluator:
      build: ./backend
      container_name: svj_calc_evaluator
      restart: unless-stopped
      env_file:
        - .env
      depends_on:
        postgres:
          condition: service_healthy
        migrate:
          condition: service_completed_successfully
      # Docker's default SIGTERM grace is 10s; the worker's graceful
      # shutdown finishes the in-flight cycle (typically <2s for 60 tags)
      # before exiting. If you have hundreds of tags or very long cycles
      # bump this; otherwise the default is fine.
      stop_grace_period: 15s
      volumes:
        - ./backend/app:/app/app
      command: ["python", "-m", "app.workers.calc_evaluator"]

volumes:
  svj_postgres_data:
