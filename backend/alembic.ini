[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# This URL is a placeholder. env.py reads DATABASE_URL from the environment
# and overrides this at runtime. Don't edit it here.
sqlalchemy.url = postgresql+psycopg2://placeholder:placeholder@localhost/placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
